<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="data:,">
    <!-- 缓存控制 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffe6fa 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 漂浮的小图案 */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0.45;
            animation: float 12s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .emoji-1 { top: 10%; left: 10%; animation-delay: 0s; }
        .emoji-2 { top: 20%; right: 15%; animation-delay: 1s; font-size: 2.5rem; }
        .emoji-3 { bottom: 15%; left: 20%; animation-delay: 2s; }
        .emoji-4 { bottom: 25%; right: 10%; animation-delay: 3s; font-size: 1.8rem; }
        .emoji-5 { top: 40%; left: 5%; animation-delay: 4s; font-size: 1.5rem; }

        .container {
            background: rgba(255, 255, 255, 0.72);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 15;
            animation: fadeInLeft 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.55);
            max-height: 85vh;
            overflow-y: auto;
            /* 隐藏滚动条 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* 主容器包裹层 */
        .main-wrapper {
            display: flex;
            gap: 200px;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.8);
            transition: opacity 0.3s ease;
        }

        /* 空状态提示 */
        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 50%, #ffffff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Ma Shan Zheng', cursive;
            letter-spacing: 2px;
            text-shadow: none;
            border-radius: 15px;
            position: relative;
            display: inline-block;
            white-space: nowrap;
        }

        /* 副标题毛玻璃背景 */
        .subtitle-wrapper {
            display: inline-block;
            position: relative;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.74);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 8px 24px rgba(216, 27, 96, 0.08);
        }

        .empty-tip {
            color: #888;
            font-size: 0.9rem;
            padding: 20px;
            display: none;
        }

        /* 中间大标题容器 */
        .title-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            animation: fadeInScale 1s ease-out;
            pointer-events: none;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            /* 隐藏滚动条 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .links::-webkit-scrollbar {
            display: none;
        }

        /* 图片卡片样式 */
        .card-images {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card-image {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card-image:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 5;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 30px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .link-item:hover::before {
            left: 100%;
        }

        .link-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.5);
        }

        .link-item:nth-child(1) {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        .link-item:nth-child(2) {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .link-item:nth-child(3) {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        .link-item:nth-child(4) {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        }

        .link-item:nth-child(5) {
            background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%);
        }

        .link-item:nth-child(6) {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }

        .link-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .links-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .external-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .external-link:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.2);
        }

        .external-link .link-icon {
            font-size: 1.2rem;
        }

        /* 装饰性星星 */
        .star {
            position: absolute;
            color: #ffd700;
            font-size: 1.2rem;
            opacity: 0.68;
        }

        .star-1 { top: 15%; left: 25%; animation-delay: 0s; }
        .star-2 { top: 30%; right: 20%; animation-delay: 0.5s; font-size: 1rem; }
        .star-3 { bottom: 35%; left: 15%; animation-delay: 1s; font-size: 0.8rem; }
        .star-4 { bottom: 20%; right: 25%; animation-delay: 1.5s; }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
                max-height: 90vh;
            }

            h1 {
                font-size: 2.2em;
            }

            .logo {
                width: 120px;
                height: 120px;
            }

            .card-image {
                width: 60px;
                height: 60px;
            }

            .link-item {
                padding: 14px 25px;
                font-size: 1rem;
            }

            .links {
                max-height: 300px;
            }
        }

        /* 空状态提示 */
        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 50%, #ffffff 100%);

            letter-spacing: 2px;

            border-radius: 15px;
            position: relative;

        }

        /* 副标题毛玻璃背景 */
        .subtitle-wrapper {
            display: inline-block;
            position: relative;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.78);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.1);
        }

        .empty-tip {
            color: #888;
            font-size: 0.9rem;
            padding: 20px;
            display: none;
        }

        /* 右侧信息面板 */
        .info-panel {
             background: rgba(255, 255, 255, 0.72);
            border-radius: 30px;
            padding: 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 15;
            animation: fadeInRight 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.55);
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 85vh;
            overflow-y: auto;
            /* 隐藏滚动条 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .info-top {
            padding: 20px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .info-bottom {
            padding: 20px 15px;
        }

        .info-panel::-webkit-scrollbar {
            display: none;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .time-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 10px 0;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 3px;
        }

        .date-display {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 15px;
            font-family: 'ZCOOL XiaoWei', serif;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .location-section {
            padding: 15px 20px;
            border-radius: 20px;
        }

        .location-text {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 600;
            font-family: 'Ma Shan Zheng', cursive;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .location-decoration {
            display: none;
        }

        .intro-section {
            text-align: left;
        }

        .intro-title {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 15px;
            font-family: 'Ma Shan Zheng', cursive;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .intro-content {
            font-size: 1rem;
            color: #fff;
            line-height: 1.8;
            font-family: 'ZCOOL XiaoWei', serif;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .intro-content p {
            margin-bottom: 12px;
        }

        /* 哲理台词切换区域 */
        .quotes-section {
            margin-top: 20px;
            padding: 15px;
            background: transparent;
            border-radius: 15px;
        }

        .quote-item {
            padding: 20px;
             background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1.2rem;
            color: #fff;
            line-height: 1.8;
            font-family: 'ZCOOL XiaoWei', serif;
            border-left: 4px solid rgba(255, 255, 255, 0.6);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: justify;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .quote-item.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }

        .quote-item.fade-in {
            opacity: 0;
            transform: translateY(10px);
        }

        .quote-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .quote-item .quote-text {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .quote-item .quote-text {
            font-style: italic;
            margin-bottom: 10px;
        }

        .quote-item .quote-source {
            font-size: 1rem;
            color: #fff;
            text-align: right;
            font-weight: 600;
            opacity: 0.9;
        }

        /* 欢迎信息样式 */
        .welcome-message {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1.2rem;
            color: #fff;
            line-height: 1.8;
            font-family: 'ZCOOL XiaoWei', serif;
            border-left: 4px solid rgba(255, 255, 255, 0.6);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .welcome-message.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }

        .welcome-message.fade-in {
            opacity: 0;
            transform: translateY(10px);
        }

        .welcome-message.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            body {
                flex-direction: column;
                gap: 25px;
                align-items: center;
                padding: 25px 20px;
            }

            .main-wrapper {

            .title-container {

            .container {

            }

            .link-item--promo {
                min-height: 520px;
            }
        }

        /* Normalize the three desktop panels to the same footprint. */
        .main-wrapper {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            align-items: stretch;
        }

        .title-container,
        .info-panel,
        .container {
            width: 100%;
            height: min(760px, calc(100vh - (var(--page-pad) * 2)));
            min-height: 620px;
            max-height: none;
        }

        .title-shell {
            height: 100%;
            min-height: 0;
        }

        .info-panel {
            grid-template-rows: minmax(230px, auto) auto auto auto;
            align-content: start;
        }

        .container {
            display: grid;
            grid-template-rows: minmax(0, 1fr);
        }

        .links,
        .route-section,
        .link-item--promo,
        .link-media {
            min-height: 0;
            height: 100%;
        }

        .link-item--promo {
            min-height: 0;
        }

        .title-wordmark {
            font-size: clamp(2.4rem, 4vw, 4rem);
        }

        .title-identity {
            grid-template-columns: minmax(0, 1fr) 96px;
        }

        .title-identity .logo {
            width: 96px;
            height: 96px;
        }

        @media (max-width: 1200px) {
            .main-wrapper {
                grid-template-columns: 1fr;
            }

            .title-container,
            .info-panel,
            .container {
                height: auto;
                min-height: 0;
            }

            .link-item--promo {
                min-height: clamp(460px, 80vw, 720px);
            }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <!-- 左侧容器 -->
        <div class="container">
            <div class="links"></div>
            <p class="empty-tip">暂时还没有可用入口</p>
        </div>

        <!-- 中间大标题 -->
        <div class="title-container">
            <div class="title-shell">
                <div class="title-copy">
                    <p class="title-kicker">PERSONAL COMMAND CORE / TERMINAL ARRAY</p>
                    <div class="title-identity">
                        <h1 class="title-wordmark">小皮皮虾</h1>
                        <img src="images/1.jpg" alt="Logo" class="logo" id="mainLogo">
                    </div>
                    <p class="title-roman">XIAO PIPI XIA</p>
                    <p class="title-description">SYSTEM</p>
                </div>
                <div class="title-meta-grid">
                    <div class="title-meta-card">
                        <span class="meta-label">CORE STATUS</span>
                        <strong>在线运行</strong>
                    </div>
                    <div class="title-meta-card">
                        <span class="meta-label">ACTIVE ROUTES</span>
                        <strong><span id="titleRouteCount">01</span> 个</strong>
                    </div>
                    <div class="title-meta-card">
                        <span class="meta-label">PROTOCOL</span>
                        <strong>STATIC-HUD</strong>
                    </div>
                    <div class="title-meta-card">
                        <span class="meta-label">BUILD YEAR</span>
                        <strong id="titleBuildYear">2026</strong>
                    </div>
                </div>
                <div class="title-footer">
                    <div class="title-spectrum" aria-hidden="true">
                        <span class="spectrum-bar"></span>
                        <span class="spectrum-bar"></span>
                        <span class="spectrum-bar"></span>
                        <span class="spectrum-bar"></span>
                        <span class="spectrum-bar"></span>
                        <span class="spectrum-bar"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧信息面板 -->
        <div class="info-panel">
            <div class="info-top">
                <div class="time-display" id="timeDisplay">00:00:00</div>
                <div class="date-display" id="dateDisplay">2025年1月1日 星期一</div>
                <div class="location-section">
                    <div class="location-decoration"></div>
                    <div class="location-text">上海市徐汇区 </div>
                </div>
            </div>
            <div class="site-address">
                <span class="site-address-label">SITE ADDRESS</span>
                <button class="site-address-copy" id="copySiteAddressButton" type="button" data-address="http://davbnjkl.xyz/">http://davbnjkl.xyz/</button>
                <span class="site-address-status" id="siteAddressStatus" aria-live="polite"></span>
            </div>
            <div class="tool-strip" aria-label="工具栏">
                <a class="tool-launch" href="tools/" aria-label="进入工具合集">
                    <span class="tool-launch-kicker">UTILITY HUB</span>
                    <strong>工具合集</strong>
                    <span class="tool-launch-action">OPEN HUB</span>
                </a>
            </div>
            <div class="info-bottom">
                <div class="quotes-section">
                    <div class="quote-item" id="quoteDisplay"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 动态生成入口的配置
        const routeSections = [
            {
                label: '解谜游戏',
                code: 'PUZZLE / GAME',
                items: [
                    {
                        href: 'cipher_game/',
                        kicker: 'ARCHIVE NODE',
                        text: '游乐园怪诞',
                        description: '闭园后的游乐园规则解谜',
                        image: 'images/youleyuan-guaidan-promo.webp',
                        imageAlt: '游乐园怪诞解谜游戏宣传图'
                    }
                ]
            }
        ];
        const toolRouteConfig = { href: 'tool/', kicker: 'UTILITY NODE', text: '字符倒序工具', description: '文本处理终端' };
        const buttonConfig = routeSections.flatMap((section) => section.items).concat(toolRouteConfig);
        // 添加新按钮时，在这里按格式添加即可
        // { href: '新链接', kicker: 'NEW NODE', text: '新项目', description: '项目说明' },
        const outboundIconMarkup = `
            <svg viewBox="0 0 24 24" class="link-icon-svg" fill="none" focusable="false" aria-hidden="true">
                <path d="M8 8h10v10"></path>
                <path d="M18 8L7 19"></path>
                <path d="M6 11V6h5"></path>
                <path d="M13 18H6v-7"></path>
            </svg>
        `;

        function generateButtons() {
            const linksContainer = document.querySelector('.links');
            const emptyTip = document.querySelector('.empty-tip');
            if (!linksContainer || !emptyTip) {
                return;
            }

            linksContainer.innerHTML = '';

            if (buttonConfig.length === 0) {
                emptyTip.style.display = 'block';
                return;
            }

            emptyTip.style.display = 'none';

            routeSections.forEach((section) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'route-section';
                sectionEl.innerHTML = `
                    <div class="route-section-head">
                        <span class="route-section-title">${section.label}</span>
                        <span class="route-section-code">${section.code}</span>
                    </div>
                `;

                (section.items || []).forEach((button, index) => {
                const link = document.createElement('a');
                link.href = button.href;
                link.className = `link-item${button.image ? ' link-item--promo' : ''}`;
                link.setAttribute('aria-label', `进入${button.text}`);
                link.innerHTML = `
                    ${button.image ? `<span class="link-media"><img src="${button.image}" alt="${button.imageAlt || button.text}" loading="lazy"></span>` : ''}
                    <span class="link-icon" aria-hidden="true">${outboundIconMarkup}</span>
                    <span class="link-copy">
                        <span class="link-kicker">${button.kicker || `节点-${String(index + 1).padStart(2, '0')}`}</span>
                        <span class="link-text">${button.text}</span>
                        ${button.description ? `<span class="link-desc">${button.description}</span>` : ''}
                    </span>
                    <span class="link-arrow" aria-hidden="true">进入</span>
                `;
                    sectionEl.appendChild(link);
                });

                linksContainer.appendChild(sectionEl);
            });
        }

        function syncTitleTelemetry() {
            const routeCount = document.getElementById('titleRouteCount');
            const buildYear = document.getElementById('titleBuildYear');

            if (routeCount) {
                routeCount.textContent = String(buttonConfig.length).padStart(2, '0');
            }

            if (buildYear) {
                buildYear.textContent = String(new Date().getFullYear());
            }
        }

        function initializeHome() {
            generateButtons();
            syncTitleTelemetry();
            initializeHardcoreInterface();
            initializeSiteAddressCopy();

            const quoteDisplay = document.getElementById('quoteDisplay');
            if (quoteDisplay) {
                quoteDisplay.classList.add('visible');
            }

            if (subtitleMessage) {
                subtitleMessage.classList.add('visible');
                window.setInterval(nextSubtitleMessage, 4000);
            }

            currentQuoteIndex = Math.floor(Math.random() * gameQuotes.length);
            showQuote(currentQuoteIndex);
            window.setInterval(nextQuote, 10000);
        }

        function initializeHardcoreInterface() {
            if (!document.querySelector('.hardcore-overlay')) {
                const overlay = document.createElement('div');
                overlay.className = 'hardcore-overlay';
                overlay.setAttribute('aria-hidden', 'true');
                document.body.appendChild(overlay);
            }

            document.addEventListener('pointermove', (event) => {
                document.documentElement.style.setProperty('--mouse-x', `${event.clientX}px`);
                document.documentElement.style.setProperty('--mouse-y', `${event.clientY}px`);
            });

            window.setInterval(() => {
                document.body.classList.add('hard-glitch');
                window.setTimeout(() => {
                    document.body.classList.remove('hard-glitch');
                }, 140 + Math.random() * 160);
                }, 4600);
        }

        function initializeSiteAddressCopy() {
            const copyButton = document.getElementById('copySiteAddressButton');
            const status = document.getElementById('siteAddressStatus');

            if (!copyButton || !status) {
                return;
            }

            copyButton.addEventListener('click', async () => {
                const address = copyButton.dataset.address || copyButton.textContent.trim();

                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(address);
                    } else {
                        const textarea = document.createElement('textarea');
                        textarea.value = address;
                        textarea.setAttribute('readonly', '');
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        textarea.remove();
                    }

                    status.textContent = 'COPIED';
                } catch (error) {
                    status.textContent = 'COPY FAILED';
                }

                window.setTimeout(() => {
                    status.textContent = '';
                }, 1600);
            });
        }
        // 缓存控制
        (function() {
            const CACHE_VERSION = '2026-04-28-v4';
            const currentVersion = localStorage.getItem('homeCacheVersion');

            // 检查版本并清除缓存
            if (currentVersion !== CACHE_VERSION) {
                localStorage.clear();
                sessionStorage.clear();

                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        return Promise.all(names.map(name => caches.delete(name)));
                    });
                }

                localStorage.setItem('homeCacheVersion', CACHE_VERSION);
                console.log('主页缓存已清除，版本:', CACHE_VERSION);
            }
        })();

        // 随机切换logo图片
        const logoImages = ['images/1.jpg', 'images/2.jpg', 'images/3.jpg', 'images/4.jpg'];
        const preloadedLogoImages = logoImages.map((src) => {
            const img = new Image();
            img.decoding = 'async';
            img.src = src;
            return img;
        });

        function rotateLogo() {
            let currentIndex = 0;
            const logo = document.getElementById('mainLogo');

            setInterval(() => {
                currentIndex = (currentIndex + 1) % logoImages.length;
                logo.style.opacity = '0';
                setTimeout(() => {
                    logo.src = preloadedLogoImages[currentIndex].src;
                    logo.style.opacity = '1';
                }, 300);
            }, 10000);
        }

        // 启动logo轮换
        window.addEventListener('load', rotateLogo);

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const timeDisplay = document.getElementById('timeDisplay');
            const dateDisplay = document.getElementById('dateDisplay');

            // 格式化时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;

            // 格式化日期
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            dateDisplay.textContent = `${year}年${month}月${date}日 ${weekday}`;
        }

        // 每秒更新时间
        setInterval(updateTime, 1000);
        updateTime();

        // 左侧欢迎语切换
        const subtitleMessages = [
            "核心链路已接入",
            "终端节点持续监听中"
        ];
        let currentSubtitleIndex = 0;
        const subtitleMessage = document.getElementById('subtitleText');

        // 切换到下一条欢迎语
        function nextSubtitleMessage() {
            currentSubtitleIndex = (currentSubtitleIndex + 1) % subtitleMessages.length;
            subtitleMessage.textContent = subtitleMessages[currentSubtitleIndex];
        }

        window.addEventListener('DOMContentLoaded', initializeHome);

        // 游戏哲理语录
        const gameQuotes = [
            { text: "只要还活着，就有希望。", source: "《合金装备》Snake" },
            { text: "人之所以会感到孤独，是因为人害怕失去。", source: "《最终幻想》" },
            { text: "即使世界充满黑暗，也要在黑暗中寻找光明。", source: "《黑暗之魂》" },
            { text: "英雄不是生来就强大，而是在绝境中选择了勇敢。", source: "《刺客信条》" },
            { text: "过去无法改变，但未来掌握在自己手中。", source: "《命运石之门》" },
            { text: "真正的力量不是为了征服，而是为了守护。", source: "《火焰纹章》" },
            { text: "即使前路充满荆棘，也要勇往直前。", source: "《怪物猎人》" },
            { text: "每一段旅程都有终点，重要的是沿途的风景。", source: "《最终幻想15》" },
            { text: "勇气不是不害怕，而是害怕依然前行。", source: "《生化危机》" },
            { text: "信任是建立在行动之上的，而不是言语。", source: "《合金装备》" },
            { text: "每个人都有属于自己的战场，重要的是如何面对。", source: "《鬼泣》" },
            { text: "失去的东西不会回来，但我们会变得更强大。", source: "《暗黑破坏神》" },
            { text: "命运可以被改写，只要我们有这个勇气。", source: "《女神异闻录》" },
            { text: "真正的敌人不是别人，而是自己的软弱。", source: "《怪物猎人》" },
            { text: "没有什么是永恒的，但记忆会永远存在。", source: "《最终幻想》" },
            { text: "即使世界毁灭，也要守护自己珍视的东西。", source: "《尼尔：机械纪元》" },
            { text: "真正的自由不是随心所欲，而是内心的平静。", source: "《刺客信条》" },
            { text: "每个人都有自己的故事，不要轻易评判他人。", source: "《巫师3》" },
            { text: "逆境中的坚持，才是真正的勇气。", source: "《黑暗之魂》" },
            { text: "爱是最强大的力量，它能够超越一切界限。", source: "《最终幻想》" },
            { text: "时间会流逝，但记忆永远珍贵。", source: "《合金装备》" },
            { text: "每个选择都有代价，重要的是不后悔。", source: "《质量效应》" },
            { text: "真正的和平不是没有战争，而是学会理解与包容。", source: "《合金装备》" },
            { text: "英雄也会迷茫，但依然选择前行。", source: "《战神》" },
            { text: "生命中最珍贵的，往往是那些平凡的时刻。", source: "《最终幻想10》" }
        ];

        let currentQuoteIndex = 0;

        // 显示当前语录
        function showQuote(index) {
            const quoteDisplay = document.getElementById('quoteDisplay');
            const quote = gameQuotes[index];

            // 添加淡出效果
            quoteDisplay.classList.add('fade-out');
            quoteDisplay.classList.remove('visible');

            setTimeout(() => {
                const formattedText = quote.text;
                quoteDisplay.innerHTML = `
                    <div class="quote-text">"${formattedText}"</div>
                    <div class="quote-source">— ${quote.source}</div>
                `;

                // 移除淡出，添加淡入
                quoteDisplay.classList.remove('fade-out');
                quoteDisplay.classList.add('fade-in');

                // 短暂延迟后添加visible类以触发淡入动画
                requestAnimationFrame(() => {
                    quoteDisplay.classList.remove('fade-in');
                    quoteDisplay.classList.add('visible');
                });
            }, 500);
        }

        // 切换到下一句语录
        function nextQuote() {
            currentQuoteIndex = (currentQuoteIndex + 1) % gameQuotes.length;
            showQuote(currentQuoteIndex);
        }
    </script>
</body>
</html>
