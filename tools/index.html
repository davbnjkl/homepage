<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具合集</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020405;
            --panel: rgba(5, 14, 17, 0.86);
            --line: rgba(95, 255, 217, 0.28);
            --line-hot: rgba(255, 106, 45, 0.72);
            --text: #d8fff5;
            --muted: #78a9a0;
            --accent: #5fffd9;
            --hot: #ff6a2d;
            --warn: #ffd166;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(18px, 3vw, 42px);
            color: var(--text);
            font-family: "Rajdhani", "Noto Sans SC", sans-serif;
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 106, 45, 0.16), transparent 24%),
                radial-gradient(circle at 82% 12%, rgba(95, 255, 217, 0.12), transparent 24%),
                linear-gradient(rgba(95, 255, 217, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(95, 255, 217, 0.035) 1px, transparent 1px),
                var(--bg);
            background-size: auto, auto, 72px 72px, 72px 72px, auto;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 5px),
                radial-gradient(circle at center, transparent 0 42%, rgba(0, 0, 0, 0.78) 100%);
            mix-blend-mode: screen;
            opacity: 0.55;
        }

        .shell {
            position: relative;
            z-index: 1;
            width: min(100%, 980px);
            min-height: min(720px, calc(100vh - 48px));
            padding: clamp(24px, 4vw, 46px);
            border: 1px solid var(--line);
            background:
                linear-gradient(180deg, rgba(10, 24, 28, 0.88), rgba(2, 6, 8, 0.9)),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 10px);
            clip-path: polygon(0 22px, 22px 0, calc(100% - 54px) 0, 100% 54px, 100% 100%, 54px 100%, 0 calc(100% - 54px));
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.78),
                0 28px 80px rgba(0, 0, 0, 0.54),
                0 0 46px rgba(95, 255, 217, 0.08),
                inset 0 0 44px rgba(0, 0, 0, 0.62);
        }

        .shell::before {
            content: "UTILITY//HUB";
            position: absolute;
            top: 18px;
            left: 22px;
            color: var(--accent);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-shadow: 0 0 12px rgba(95, 255, 217, 0.55);
        }

        .hero {
            display: grid;
            gap: 12px;
            margin-top: 34px;
            margin-bottom: clamp(22px, 4vw, 38px);
        }

        .kicker {
            margin: 0;
            color: var(--hot);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
        }

        h1 {
            margin: 0;
            color: #effffb;
            font-family: "Orbitron", "Noto Sans SC", sans-serif;
            font-size: clamp(2.7rem, 8vw, 6rem);
            line-height: 0.92;
            letter-spacing: 0.04em;
            text-shadow:
                3px 0 0 rgba(255, 106, 45, 0.42),
                -3px 0 0 rgba(95, 255, 217, 0.32),
                0 0 42px rgba(95, 255, 217, 0.22);
        }

        .desc {
            margin: 0;
            max-width: 680px;
            color: var(--muted);
            font-family: "Noto Sans SC", sans-serif;
            line-height: 1.8;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .tool-card {
            position: relative;
            min-height: 176px;
            display: grid;
            align-content: space-between;
            gap: 16px;
            padding: 18px;
            color: var(--text);
            text-decoration: none;
            border: 1px solid rgba(95, 255, 217, 0.24);
            background:
                linear-gradient(135deg, rgba(95, 255, 217, 0.1), rgba(3, 9, 11, 0.95) 38%, rgba(255, 106, 45, 0.09)),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 11px);
            clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
            box-shadow: inset 0 0 28px rgba(95, 255, 217, 0.045);
            overflow: hidden;
        }

        .tool-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 106, 45, 0.24), rgba(95, 255, 217, 0.18), transparent);
            transform: translateX(-120%);
            transition: transform 0.45s ease;
        }

        .tool-card:hover::before {
            transform: translateX(120%);
        }

        .tool-card:hover {
            border-color: var(--line-hot);
            box-shadow:
                0 0 28px rgba(255, 106, 45, 0.16),
                inset 0 0 32px rgba(95, 255, 217, 0.08);
        }

        .tool-code,
        .tool-action {
            position: relative;
            z-index: 1;
            color: var(--hot);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.66rem;
            letter-spacing: 0.18em;
        }

        .tool-title {
            position: relative;
            z-index: 1;
            margin: 0;
            font-family: "Noto Sans SC", sans-serif;
            font-size: 1.38rem;
            line-height: 1.35;
            letter-spacing: 0.08em;
        }

        .tool-copy {
            position: relative;
            z-index: 1;
            margin: 0;
            color: var(--muted);
            font-family: "Noto Sans SC", sans-serif;
            line-height: 1.7;
            font-size: 0.96rem;
        }

        .tool-action {
            justify-self: end;
            color: var(--accent);
        }

        .footer {
            margin-top: clamp(22px, 4vw, 38px);
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-top: 1px solid rgba(95, 255, 217, 0.16);
            padding-top: 16px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 16px;
            color: var(--warn);
            text-decoration: none;
            border: 1px solid rgba(255, 106, 45, 0.42);
            background: rgba(255, 106, 45, 0.08);
            font-family: "JetBrains Mono", monospace;
            letter-spacing: 0.12em;
        }

        .status {
            color: var(--muted);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
        }

        @media (max-width: 760px) {
            body {
                place-items: start center;
                padding: 14px;
            }

            .shell {
                min-height: auto;
                padding: 24px 18px;
                clip-path: polygon(0 14px, 14px 0, calc(100% - 32px) 0, 100% 32px, 100% 100%, 32px 100%, 0 calc(100% - 32px));
            }

            .tool-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="kicker">TOOLS COLLECTION / STATIC NODE</p>
            <h1>工具合集</h1>
            <p class="desc">更多工具持续开发中</p>
        </section>

        <section class="tool-grid" aria-label="工具入口">
            <a class="tool-card" href="../tool/" aria-label="进入字符倒序工具">
                <span class="tool-code">UTILITY NODE 01</span>
                <h2 class="tool-title">字符倒序工具</h2>
                <p class="tool-copy">输入文本后按字符逆序输出。</p>
                <span class="tool-action">OPEN TOOL</span>
            </a>

            <a class="tool-card" href="https://www.petpetgenerator.com/" target="_blank" rel="noopener noreferrer" aria-label="打开摸摸表情包制作">
                <span class="tool-code">EXTERNAL NODE 02</span>
                <h2 class="tool-title">摸摸表情包制作</h2>
                <p class="tool-copy">用于制作摸摸头表情包。</p>
                <span class="tool-action">OPEN WEB</span>
            </a>
        </section>

        <footer class="footer">
            <a class="back-link" href="../index.html">BACK HOME</a>
            <span class="status">2 ACTIVE TOOLS</span>
        </footer>
    </main>
</body>
</html>
